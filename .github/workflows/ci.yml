name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: build / test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22', '24']
    env:
      CI_LIVE: ${{ vars.CI_LIVE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: install
        run: npm install

      - name: typecheck
        run: |
          for pkg in packages/*/; do
            if [ -f "$pkg/tsconfig.json" ]; then
              echo "::group::tsc --noEmit $pkg"
              (cd "$pkg" && npx --no-install tsc --noEmit)
              echo "::endgroup::"
            fi
          done

      - name: build
        run: npm run build

      - name: test
        run: npm test

  sbom:
    name: sbom
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: install
        run: npm install

      - name: generate sbom
        run: npx --yes @cyclonedx/cyclonedx-npm@latest --output-file sbom.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          if-no-files-found: error

  vuln-scan:
    name: osv-scanner
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: install
        run: npm install

      - name: osv-scanner
        run: npx --yes osv-scanner@latest scan --recursive --fail-on-vuln HIGH .
