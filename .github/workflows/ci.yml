name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: build / test
    runs-on: ubuntu-latest
    env:
      CI_LIVE: ${{ vars.CI_LIVE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: install
        run: npm install

      - name: build
        run: npm run build

      - name: test
        run: npm test

  sbom:
    name: sbom
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: install
        run: npm install

      - name: generate sbom
        run: npx --yes @cyclonedx/cyclonedx-npm@latest --ignore-npm-errors --output-file sbom.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          if-no-files-found: error

  vuln-scan:
    name: osv-scanner
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: google/osv-scanner-action/osv-scanner-action@v2.2.4
        with:
          scan-args: |-
            --recursive
            ./
