name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nericarcasci/agent-api-server

jobs:
  build:
    name: build + sbom + npm publish
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: install
        run: npm install

      - name: build
        run: npm run build

      - name: test
        run: npm test

      - name: sbom
        run: npx --yes @cyclonedx/cyclonedx-npm@latest --output-file sbom.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: publish workspaces to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for pkg in packages/*/; do
            name=$(node -p "require('./$pkg/package.json').name" 2>/dev/null || echo "")
            private=$(node -p "require('./$pkg/package.json').private===true" 2>/dev/null || echo "false")
            case "$name" in
              @fuze-ai/*)
                if [ "$private" = "true" ]; then
                  echo "skip private $name"
                  continue
                fi
                echo "::group::publish $name"
                (cd "$pkg" && npm publish --provenance --access public)
                echo "::endgroup::"
                ;;
              *) ;;
            esac
          done

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: sbom.json

  image:
    name: build + sign agent-api-server image
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: registry login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build + push (multi-arch)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/agent-api-server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          provenance: true
          sbom: true

      - uses: sigstore/cosign-installer@v3

      - name: cosign sign (keyless / oidc)
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign --yes \
            "${REGISTRY}/${IMAGE_NAME}@${{ steps.push.outputs.digest }}"
