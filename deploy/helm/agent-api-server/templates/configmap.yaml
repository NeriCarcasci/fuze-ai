apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent-api-server.fullname" . }}
  labels:
    {{- include "agent-api-server.labels" . | nindent 4 }}
data:
  {{- range $k, $v := .Values.env }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- if .Values.redis.url }}
  REDIS_URL: {{ .Values.redis.url | quote }}
  {{- end }}
  {{- if .Values.suspendStore.dsn }}
  SUSPEND_STORE_DSN: {{ .Values.suspendStore.dsn | quote }}
  {{- end }}
