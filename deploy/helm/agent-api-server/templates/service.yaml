apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-api-server.fullname" . }}
  labels:
    {{- include "agent-api-server.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
    {{- if .Values.mtls.sidecar.enabled }}
    - name: mtls
      port: {{ .Values.mtls.sidecar.listenPort }}
      targetPort: mtls
      protocol: TCP
    {{- end }}
  selector:
    {{- include "agent-api-server.selectorLabels" . | nindent 4 }}
