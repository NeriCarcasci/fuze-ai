# Reference nginx config for mTLS edge termination in the sovereign tier.
# Placeholders to replace before deploy:
#   <api_upstream>     — host:port of the agent-api-server (e.g. agent-api-server:3000)
#   <server_name>      — public hostname (e.g. agent.example.eu)
#   <ca_bundle_path>   — path to the customer-trusted CA bundle (PEM)
#   <server_cert_path> — server certificate (PEM, leaf + chain)
#   <server_key_path>  — server private key (PEM)
#   <ocsp_resolver>    — DNS resolver for OCSP stapling (e.g. 1.1.1.1 9.9.9.9)

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    log_format mtls escape=json
        '{'
            '"ts":"$time_iso8601",'
            '"remote":"$remote_addr",'
            '"req":"$request",'
            '"status":$status,'
            '"bytes":$bytes_sent,'
            '"client_cn":"$ssl_client_s_dn",'
            '"client_serial":"$ssl_client_serial",'
            '"client_verify":"$ssl_client_verify",'
            '"upstream":"$upstream_addr",'
            '"upstream_status":"$upstream_status",'
            '"latency":$request_time'
        '}';
    access_log /var/log/nginx/access.log mtls;

    # Edge rate limit — applied per client IP. Tune per deployment.
    limit_req_zone $binary_remote_addr zone=edge:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=edge_conn:10m;

    upstream api_upstream {
        server <api_upstream>;
        keepalive 64;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name <server_name>;

        ssl_certificate     <server_cert_path>;
        ssl_certificate_key <server_key_path>;

        # TLS 1.3 only.
        ssl_protocols TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:TLS:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling.
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver <ocsp_resolver> valid=300s;
        resolver_timeout 5s;

        # mTLS — require a client certificate signed by the customer CA bundle.
        ssl_client_certificate <ca_bundle_path>;
        ssl_verify_client on;
        ssl_verify_depth 3;

        # HSTS only after the customer is sure of their cert chain.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;

        client_max_body_size 4m;

        location / {
            limit_req zone=edge burst=40 nodelay;
            limit_conn edge_conn 50;

            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Client-Cert-CN     $ssl_client_s_dn;
            proxy_set_header X-Client-Cert-Serial $ssl_client_serial;
            proxy_set_header X-Client-Cert-Verify $ssl_client_verify;

            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_buffering off;  # streaming responses (SSE)
        }

        # Health endpoint — no rate limit, no client-cert info.
        location = /v1/health {
            proxy_pass http://api_upstream;
            access_log off;
        }
    }
}
